<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANK RM</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
}

/* LOGIN */

#loginPage{
height:100vh;
background:linear-gradient(160deg,#0033cc,#ff0000);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
background:#fff;
width:100%;
max-width:380px;
padding:30px;
border-radius:30px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.logo{
text-align:center;
font-size:40px;
color:#0033cc;
margin-bottom:10px;
}

.bank-name{
text-align:center;
font-size:30px;
font-weight:bold;
color:#0033cc;
margin-bottom:25px;
}

.input-group{
margin-bottom:15px;
}

.input-group input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#0033cc;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* DASHBOARD */

#dashboard{
display:none;
max-width:450px;
margin:auto;
padding-bottom:100px;
}

.header{
background:linear-gradient(135deg,#0033cc,#ff0000);
padding:25px;
border-radius:0 0 30px 30px;
color:white;
}

.header h2{
margin-bottom:5px;
}

.balance-card{
margin:-30px 15px 0;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.balance{
font-size:35px;
font-weight:bold;
color:#0033cc;
margin-top:10px;
}

.menu{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.menu-item{
text-align:center;
}

.icon{
width:55px;
height:55px;
background:#f2f4f8;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
font-size:20px;
color:#0033cc;
}

.menu-item p{
font-size:12px;
margin-top:5px;
}

.history{
margin:15px;
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 3px 15px rgba(0,0,0,.08);
}

.history h3{
margin-bottom:10px;
}

.transaksi{
padding:12px 0;
border-bottom:1px solid #eee;
}

.nominal{
float:right;
font-weight:bold;
color:red;
}

.chat-admin{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:420px;
padding:15px;
background:linear-gradient(135deg,#0033cc,#ff0000);
color:white;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
max-width:450px;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -3px 10px rgba(0,0,0,.1);
}

.bottom-nav div{
text-align:center;
font-size:12px;
color:#555;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
width:90%;
max-width:350px;
padding:20px;
border-radius:20px;
}

.popup-box h3{
margin-bottom:15px;
}

.popup-box input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:10px;
}

.btn-merah{
background:#ff0000;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
cursor:pointer;
}

.btn-putih{
margin-top:10px;
background:#eee;
border:none;
padding:12px;
width:100%;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<div class="logo">
<i class="fa-solid fa-building-columns"></i>
</div>

<div class="bank-name">
BANK RM
</div>

<div class="input-group">
<input type="text" id="userid" placeholder="User ID">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
</div>

<button class="login-btn" onclick="login()">
MASUK
</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="header">
<h2>Selamat Datang</h2>
<p>Nomor Rekening : 1234567890</p>
</div>

<div class="balance-card">

<p>Saldo Tersedia</p>

<div class="balance" id="saldo">
RM 50,000
</div>

<div class="menu">

<div class="menu-item">
<div class="icon">
<i class="fa-solid fa-money-bill-transfer"></i>
</div>
<p>Transfer</p>
</div>

<div class="menu-item">
<div class="icon" onclick="bukaTarik()">
<i class="fa-solid fa-arrow-down"></i>
</div>
<p>Tarik Dana</p>
</div>

<div class="menu-item">
<div class="icon">
<i class="fa-solid fa-wallet"></i>
</div>
<p>Deposit</p>
</div>

<div class="menu-item">
<div class="icon">
<i class="fa-solid fa-file-lines"></i>
</div>
<p>Mutasi</p>
</div>

</div>

</div>

<div class="history">

<h3>Riwayat Transaksi</h3>

<div id="riwayat">

<div class="transaksi">
Deposit Awal
<span class="nominal" style="color:green">
+RM 50,000
</span>
</div>

</div>

</div>

<button class="chat-admin"
onclick="window.open('https://wa.me/60123456789')">

<i class="fa-brands fa-whatsapp"></i>
Chat Admin

</button>

<div class="bottom-nav">

<div>
<i class="fa-solid fa-house"></i>
<br>Home
</div>

<div>
<i class="fa-solid fa-right-left"></i>
<br>Transfer
</div>

<div>
<i class="fa-solid fa-clock-rotate-left"></i>
<br>Riwayat
</div>

<div>
<i class="fa-solid fa-user"></i>
<br>Akun
</div>

</div>

</div>

<!-- POPUP TARIK DANA -->

<div class="popup" id="popup">

<div class="popup-box">

<h3>Tarik Dana</h3>

<input type="number"
id="jumlahTarik"
placeholder="Masukkan jumlah RM">

<button class="btn-merah"
onclick="tarikDana()">

Konfirmasi

</button>

<button class="btn-putih"
onclick="tutupTarik()">

Batal

</button>

</div>

</div>

<script>

let saldo = 50000;

function login(){

let id = document.getElementById("userid").value;
let pass = document.getElementById("password").value;

if(id=="admin" && pass=="12345"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

alert("ID atau Password Salah");

}

}

function bukaTarik(){

document.getElementById("popup").style.display="flex";

}

function tutupTarik(){

document.getElementById("popup").style.display="none";

}

function tarikDana(){

let jumlah =
parseFloat(document.getElementById("jumlahTarik").value);

if(isNaN(jumlah) || jumlah<=0){

alert("Masukkan jumlah yang benar");
return;

}

if(jumlah > saldo){

alert("Saldo tidak mencukupi");
return;

}

saldo -= jumlah;

document.getElementById("saldo").innerHTML =
"RM " + saldo.toLocaleString();

let item =
document.createElement("div");

item.className="transaksi";

item.innerHTML=
'Penarikan Dana <span class="nominal">-RM '+
jumlah.toLocaleString()+
'</span>';

document.getElementById("riwayat")
prepend(item);

alert("Penarikan berhasil diproses");

tutupTarik();

}

</script>

</body>
</html>
