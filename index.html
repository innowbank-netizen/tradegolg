<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHM MARKETS INVESTMENT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(160deg,#010b08,#042d22,#000);
    color:white;
}

/* LOGIN */
#loginPage{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:360px;
    padding:28px;
    border-radius:25px;
    background:rgba(255,255,255,.07);
    box-shadow:0 10px 35px rgba(0,0,0,.45);
    text-align:center;
}

.login-box h2{
    color:#22c55e;
    margin-bottom:8px;
}

.login-box p{
    color:#ccc;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,.12);
    color:white;
}

input::placeholder{
    color:#ccc;
}

button{
    width:100%;
    padding:16px;
    margin-top:10px;
    border:none;
    border-radius:15px;
    background:#22c55e;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

/* DASHBOARD */
.container{
    display:none;
    width:100%;
    max-width:420px;
    margin:auto;
    min-height:100vh;
    padding:20px;
}

.logo{
    text-align:center;
    margin-top:20px;
    margin-bottom:30px;
}

.logo h1{
    color:#22c55e;
    font-size:28px;
}

.logo p{
    color:#bfbfbf;
    margin-top:5px;
}

.card{
    background:linear-gradient(135deg,#064e3b,#052e25);
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.title{
    font-size:18px;
    opacity:.8;
}

.saldo{
    font-size:42px;
    font-weight:bold;
    margin:20px 0;
}

.icon{
    font-size:65px;
    margin-bottom:20px;
}

.info{
    margin-top:25px;
    background:rgba(255,255,255,.05);
    border-radius:20px;
    padding:20px;
}

.info h3{
    color:#22c55e;
    margin-bottom:15px;
}

.info p{
    line-height:30px;
    color:#d5d5d5;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#888;
    font-size:13px;
}
</style>
</head>

<body>

<!-- PANEL LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <h2>📈 FHM MARKETS</h2>
        <p>Login Akaun Trading</p>

        <input id="userId" placeholder="ID Pengguna">
        <input id="password" type="password" placeholder="Kata Laluan">

        <button onclick="login()">LOGIN</button>
    </div>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard">

    <div class="logo">
        <h1>📈 FHM MARKETS</h1>
        <p>INVESTMENT DEMO</p>
    </div>

    <div class="card">
        <div class="title">SALDO AKAUN</div>

        <div class="saldo">
            RM <span id="saldo">79,990.00</span>
        </div>

        <div class="icon">💰</div>

        <button onclick="withdraw()">TARIK SALDO</button>
    </div>

    <div class="info">
        <h3>MAKLUMAT AKAUN</h3>
        <p>Nama Pengguna : NUR BALQIS</p>
        <p>ID Trading : BALQIS</p>
        <p>Status Akaun : AKTIF</p>
    </div>

    <div class="footer">
        © 2026 FHM MARKETS INVESTMENT DEMO
    </div>

</div>

<script>
let saldo = 79990;

function formatRM(n){
    return n.toLocaleString("ms-MY",{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function login(){
    let id = document.getElementById("userId").value.trim();
    let pw = document.getElementById("password").value.trim();

    if(id === "BALQIS" && pw === "4792"){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    }else{
        alert("ID atau kata laluan salah");
    }
}

function withdraw(){
    let jumlah = prompt("Masukkan jumlah tarik saldo");

    if(jumlah === null){
        return;
    }

    jumlah = Number(jumlah);

    if(isNaN(jumlah) || jumlah <= 0){
        alert("Jumlah tidak sah");
        return;
    }

    if(jumlah > saldo){
        alert("Saldo tidak mencukupi");
        return;
    }

    saldo = saldo - jumlah;

    document.getElementById("saldo").innerText = formatRM(saldo);

    alert("Permintaan tarik saldo berjaya dihantar.");
}
</script>

</body>
</html>
